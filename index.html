function imgMemeRender(cv,text,mood,seed){
  let c=cv.getContext('2d'),W=256,H=256;cv.width=W;cv.height=H;
  let r=sr(seed);

  let g=c.createLinearGradient(0,0,W,H);g.addColorStop(0,cols[0]);g.addColorStop(1,cols[1]);
  c.fillStyle=g;c.fillRect(0,0,W,H);

  function postProcess(){
    let ov=c.createLinearGradient(0,0,0,H);ov.addColorStop(0,'rgba(0,0,0,0.1)');ov.addColorStop(0.5,'rgba(0,0,0,0)');ov.addColorStop(1,'rgba(0,0,0,0.3)');

  }

  // Style roulette: pick a visual style based on seed
  let style=IMG_STYLES[Math.abs(seed)%IMG_STYLES.length];
  let prompt=encodeURIComponent(text+', '+style);
  let aiUrl='https://image.pollinations.ai/prompt/'+prompt+'?model=flux&width=512&height=512&nologo=true&seed='+Math.abs(seed%9999)+'&key='+POLLEN_KEY;
  let fallbackUrl='https://picsum.photos/seed/rf'+Math.abs(seed%9999)+'/512/512';

  let img=new Image();img.crossOrigin='anonymous';
  let done=false;
  function loadFallback(){
    if(done)return;done=true;
    let fb=new Image();fb.crossOrigin='anonymous';
    fb.onload=function(){c.drawImage(fb,0,0,W,H);postProcess()};

    fb.src=fallbackUrl;

    let x=r()*W,y=r()*H,sz=Math.abs(r()*200+50);
    c.beginPath();c.arc(x,y,sz,0,Math.PI*2);
    c.fillStyle='rgba('+(r()*255|0)+','+(r()*255|0)+','+(r()*255|0)+','+(r()*0.2+0.05)+')';
    c.fill();
  }
  try{
    let id=c.getImageData(0,0,W,H),d=id.data;
    let sliceH=4+Math.floor(r()*12);
    for(let y=0;y<H;y+=sliceH){
      let shift=Math.floor((r()-0.5)*30);
      let h=Math.min(sliceH,H-y);
      if(Math.abs(shift)>2){
        let slice=c.getImageData(0,y,W,h);
        c.putImageData(slice,shift,y);
      }
    }
    id=c.getImageData(0,0,W,H);d=id.data;
    let r2=sr(seed+99);
    for(let i=0;i<d.length;i+=4){
      if(r2()<0.03){d[i]=255;d[i+1]=0;d[i+2]=0;d[i+3]=180;}
      else if(r2()<0.03){d[i]=0;d[i+1]=255;d[i+2]=0;d[i+3]=180;}
    }
    for(let y=0;y<H;y++){
      if(r2()<0.08){
        for(let x=0;x<W;x++){let p=(y*W+x)*4;d[p]=d[p]+50;d[p+1]=d[p+1]-20;d[p+2]=d[p+2]+30;}
      }
    }
    c.putImageData(id,0,0);
    c.fillStyle='rgba(0,0,0,0.02)';
    for(let i=0;i<H;i+=2){c.fillRect(0,i,W,1);}
  }catch(e){}
}

// Create a card from chaos engine result
function createChaosCard(collision, words, mood){
  let d=document.createElement('div');
  d.className='cd user-card';
  d.dataset.category=mood;

  let promptSeed = words.join(' ') + collision;
  let ix = Math.floor(Math.random()*10000);
  let seed = hs(promptSeed)+ix*777;
  let cv=document.createElement('canvas');d.appendChild(cv);

  d.insertAdjacentHTML('beforeend',`<div class="rb rl">\u26A1 YOUR CREATION</div><div class="wm">rotfeed</div><div class="cb"><div class="ci"><div class="cc">${mood} \u00B7 ${words.join(' + ')}</div><div class="ct">${collision}</div><div class="cm"><span>\uD83D\uDC41 0</span><span>\uD83D\uDD50 just now</span></div></div></div>`);

  requestAnimationFrame(()=>{
    let c2=d.querySelector('canvas');
    if(!c2)return;
    // User creations always get AI-generated images
    imgMemeRender(c2,collision,mood,seed);
  });
  return d
}

function demoCollide(words,mood){
  let templates=CURSED_TEMPLATES[mood]||CURSED_TEMPLATES.chaotic;
  let t=templates[Math.floor(Math.random()*templates.length)];
  let collision=t.replace(/\{1\}/g,words[0]).replace(/\{2\}/g,words[1]).replace(/\{3\}/g,words[2]);

}

async function apiCollide(words,mood){
  try{
    let res=await fetch(WORKER_URL+'/api/collide',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({words,mood})
    });
    if(!res.ok) throw new Error('API error');
    return await res.json();
  }catch(e){
    return demoCollide(words,mood);
  }
}

async function doCollide(){
  if(isColliding)return;
  let w1=document.getElementById('w1').value.trim();
  let w2=document.getElementById('w2').value.trim();
  let w3=document.getElementById('w3').value.trim();

  if(!w1||!w2||!w3){
    st2('\u26A0\uFE0F drop all 3 words');
    // Shake empty inputs
    [['w1',w1],['w2',w2],['w3',w3]].forEach(([id,val])=>{
      if(!val){
        let el=document.getElementById(id);
        el.style.borderColor='var(--a)';
        el.style.animation='shake .4s';
        setTimeout(()=>{el.style.borderColor='';el.style.animation=''},400);
      }
    });
    return;
  }

  isColliding=true;
  let words=[w1,w2,w3];
  let btn=document.getElementById('collideBtn');
  btn.disabled=true;

  // Close portal, show chaos overlay
  closePortal();
  let ov=document.getElementById('chaosOv');
  let cw=document.getElementById('chaosWords');
  let cf=document.getElementById('chaosFrags');
  let cs=document.getElementById('chaosStitch');
  cw.innerHTML='';cf.innerHTML='';cs.textContent='';cs.classList.remove('vis');
  ov.classList.add('active');

  // Show words popping in
  words.forEach(w=>{
    let span=document.createElement('span');
    span.className='chaos-word';span.textContent=w;
    cw.appendChild(span);
  });

  // Fire the collide
  let result;
  if(WORKER_URL){
    result=await apiCollide(words,selectedMood);
  } else {
    // Demo mode with fake delay
    await new Promise(r=>setTimeout(r,1500));
    result=demoCollide(words,selectedMood);
  }

  // Show the collision sentence
  let div=document.createElement('div');
  div.className='chaos-frag';div.textContent=result.collision;
  cf.appendChild(div);
  await new Promise(r=>setTimeout(r,300));
  div.classList.add('vis');

  // Show complete
  await new Promise(r=>setTimeout(r,600));
  cs.textContent='\u26A1 COLLISION COMPLETE';
  cs.classList.add('vis');

  // Vibrate on mobile
  if(navigator.vibrate)navigator.vibrate([50,50,100]);

  await new Promise(r=>setTimeout(r,1000));

  // Hide overlay
  ov.classList.remove('active');

  // Create card and prepend to feed
  let card=createChaosCard(result.collision,words,selectedMood);
  let fd=document.getElementById('fd');
  fd.prepend(card);
  setTimeout(()=>card.classList.add('v'),50);

  // Scroll to top to see the card
  window.scrollTo({top:0,behavior:'smooth'});

  // Clear inputs
  document.getElementById('w1').value='';
  document.getElementById('w2').value='';
  document.getElementById('w3').value='';

  // Toast
  st2('\uD83E\uDDEA your cursed creation has entered the feed');

  btn.disabled=false;
  isColliding=false;
}
