<style>

</style>

  else if(st===1){for(let i=0;i<200;i++){let x=r()*W,y=r()*H;c.beginPath();c.moveTo(x,y);c.strokeStyle=`hsla(${(h1+r()*80)%360},70%,55%,${.1+r()*.2})`;c.lineWidth=.5+r()*2;for(let s=0;s<50;s++){let an=(Math.sin(x*.005+sd*.01)+Math.cos(y*.005))*Math.PI;x+=Math.cos(an)*4;y+=Math.sin(an)*4;if(x<0||x>W||y<0||y>H)break;c.lineTo(x,y)}c.stroke()}}
  else if(st===2){for(let i=0;i<60;i++){c.fillStyle=`hsla(${(h1+r()*90)%360},${50+r()*50}%,${30+r()*30}%,${.1+r()*.3})`;c.fillRect(r()*W,r()*H,r()*200+10,r()*30+2)}for(let y=0;y<H;y+=3){c.fillStyle=`rgba(0,0,0,${.1+r()*.1})`;c.fillRect(0,y,W,1)}}
  else if(st===3){let pts=[];for(let i=0;i<80;i++)pts.push({x:r()*W,y:r()*H,r:r()*3+1});c.strokeStyle=`hsla(${h1},50%,60%,.1)`;c.lineWidth=.5;for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){if(Math.hypot(pts[i].x-pts[j].x,pts[i].y-pts[j].y)<80){c.beginPath();c.moveTo(pts[i].x,pts[i].y);c.lineTo(pts[j].x,pts[j].y);c.stroke()}}pts.forEach(p=>{let g3=c.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4);g3.addColorStop(0,`hsla(${h2},80%,70%,.8)`);g3.addColorStop(1,'transparent');c.fillStyle=g3;c.beginPath();c.arc(p.x,p.y,p.r*4,0,Math.PI*2);c.fill()})}
  else{for(let i=0;i<15;i++){let cx=r()*W,cy=r()*H;c.fillStyle=`hsla(${(h1+r()*100)%360},60%,45%,${.08+r()*.12})`;c.beginPath();for(let s=0;s<=60;s++){let an=(s/60)*Math.PI*2,br=50+r()*100,nr=br+Math.sin(an*3+sd)*30;let px=cx+Math.cos(an)*nr,py=cy+Math.sin(an)*nr;s===0?c.moveTo(px,py):c.lineTo(px,py)}c.closePath();c.fill()}}
  let v=c.createRadialGradient(W/2,H/2,W*.3,W/2,H/2,W*.8);v.addColorStop(0,'transparent');v.addColorStop(1,'rgba(0,0,0,.5)');c.fillStyle=v;c.fillRect(0,0,W,H);
  let id=c.getImageData(0,0,W,H),d=id.data;for(let i=0;i<d.length;i+=4){let n=(r()-.5)*15;d[i]+=n;d[i+1]+=n;d[i+2]+=n}c.putImageData(id,0,0)
}

// Meme-style canvas: big bold text on vivid gradient
function memeRender(cv,text,mood,seed){
  let c=cv.getContext('2d'),W=512,H=512;cv.width=W;cv.height=H;
  let r=sr(seed);
  // Vivid gradient bg
  let moodColors={unhinged:['#ff2d55','#ff6b00'],cursed:['#1a0030','#4a0080'],dreamy:['#ff9a9e','#fad0c4'],angry:['#ff0000','#990000'],cosmic:['#0f0c29','#302b63'],chaotic:['#00ff87','#60efff']};
  let cols=moodColors[mood]||moodColors.chaotic;
  let g=c.createLinearGradient(0,0,r()>0.5?W:0,H);
  g.addColorStop(0,cols[0]);g.addColorStop(1,cols[1]);
  c.fillStyle=g;c.fillRect(0,0,W,H);
  // Random decorative shapes
  for(let i=0;i<8;i++){
    c.save();c.globalAlpha=0.08+r()*0.1;
    c.fillStyle=r()>0.5?cols[0]:cols[1];
    c.beginPath();c.arc(r()*W,r()*H,r()*200+50,0,Math.PI*2);c.fill();
    c.restore();
  }
  // Impact-style text
  c.textAlign='center';c.textBaseline='middle';
  let words=text.toUpperCase().split(' ');
  let fontSize=Math.min(72,Math.floor(2400/(text.length+1)));
  if(fontSize<28)fontSize=28;
  c.font=`900 ${fontSize}px "Space Grotesk",Impact,sans-serif`;
  // Word wrap
  let lines=[],ln='',maxW=W-60;
  for(let w of words){let test=ln?ln+' '+w:w;if(c.measureText(test).width>maxW&&ln){lines.push(ln);ln=w}else ln=test}
  if(ln)lines.push(ln);
  let totalH=lines.length*fontSize*1.15;
  let startY=H/2-totalH/2+fontSize/2;
  // Text shadow + stroke
  lines.forEach((line,i)=>{
    let y=startY+i*fontSize*1.15;
    c.strokeStyle='rgba(0,0,0,0.9)';c.lineWidth=fontSize/5;c.lineJoin='round';
    c.strokeText(line,W/2,y);
    c.fillStyle='#fff';c.fillText(line,W/2,y);
  });
  // Noise grain
  let id=c.getImageData(0,0,W,H),d=id.data;
  for(let i=0;i<d.length;i+=4){let n=(r()-.5)*20;d[i]+=n;d[i+1]+=n;d[i+2]+=n}
  c.putImageData(id,0,0);
}

// Glitch-style canvas: scanlines, RGB split, fragmented text
function glitchRender(cv,text,mood,seed){
  let c=cv.getContext('2d'),W=512,H=512;cv.width=W;cv.height=H;
  let r=sr(seed);
  // Dark base
  c.fillStyle='#0a0a0a';c.fillRect(0,0,W,H);
  // Glitch blocks
  let h1=Math.floor(r()*360);
  for(let i=0;i<30;i++){
    let x=r()*W-50,y=r()*H,w=r()*300+20,h2=r()*40+5;
    c.fillStyle=`hsla(${(h1+r()*120)%360},90%,50%,${0.05+r()*0.15})`;
    c.fillRect(x,y,w,h2);
  }
  // Scanlines
  for(let y=0;y<H;y+=2){c.fillStyle=`rgba(0,0,0,${0.2+r()*0.1})`;c.fillRect(0,y,W,1)}
  // Main text with RGB split effect
  let fontSize=Math.min(56,Math.floor(2000/(text.length+1)));
  if(fontSize<24)fontSize=24;
  c.font=`700 ${fontSize}px "Space Grotesk",monospace`;c.textAlign='center';c.textBaseline='middle';
  let words=text.toUpperCase().split(' '),lines=[],ln='',maxW=W-80;
  for(let w of words){let test=ln?ln+' '+w:w;if(c.measureText(test).width>maxW&&ln){lines.push(ln);ln=w}else ln=test}
  if(ln)lines.push(ln);
  let totalH=lines.length*fontSize*1.2;
  let startY=H/2-totalH/2+fontSize/2;
  // RGB split
  let offR=2+Math.floor(r()*4),offB=-(2+Math.floor(r()*4));
  lines.forEach((line,i)=>{
    let y=startY+i*fontSize*1.2;
    c.globalCompositeOperation='lighter';
    c.fillStyle='rgba(255,0,0,0.7)';c.fillText(line,W/2+offR,y);
    c.fillStyle='rgba(0,255,0,0.7)';c.fillText(line,W/2,y);
    c.fillStyle='rgba(0,100,255,0.7)';c.fillText(line,W/2+offB,y);
    c.globalCompositeOperation='source-over';
  });
  // Random horizontal glitch tears
  for(let i=0;i<5;i++){
    let y=Math.floor(r()*H),h2=Math.floor(r()*15)+3;
    let shift=Math.floor(r()*40)-20;
    let strip=c.getImageData(0,y,W,h2);
    c.putImageData(strip,shift,y);
  }
  // Noise
  let id=c.getImageData(0,0,W,H),d=id.data;
  for(let i=0;i<d.length;i+=4){let n=(r()-.5)*30;d[i]+=n;d[i+1]+=n;d[i+2]+=n}
  c.putImageData(id,0,0);
}

  let cf=document.getElementById('chaosFrags');
  let cs=document.getElementById('chaosStitch');
  cw.innerHTML='';cf.innerHTML='';cs.textContent='';cs.classList.remove('vis');
  ov.classList.add('active');

  // Show words popping in
  words.forEach(w=>{
    let span=document.createElement('span');
    span.className='chaos-word';span.textContent=w;
    cw.appendChild(span);
  });

  // Fire the collide
  let result;
  if(WORKER_URL){
    result=await apiCollide(words,selectedMood);
  } else {
    // Demo mode with fake delay
    await new Promise(r=>setTimeout(r,1500));
    result=demoCollide(words,selectedMood);
  }

  // Show the collision sentence
  let div=document.createElement('div');
  div.className='chaos-frag';div.textContent=result.collision;
  cf.appendChild(div);
  await new Promise(r=>setTimeout(r,300));
  div.classList.add('vis');

  // Show complete
  await new Promise(r=>setTimeout(r,600));
  cs.textContent='\u26A1 COLLISION COMPLETE';
  cs.classList.add('vis');

  // Vibrate on mobile
  if(navigator.vibrate)navigator.vibrate([50,50,100]);

  await new Promise(r=>setTimeout(r,1000));

  // Hide overlay
  ov.classList.remove('active');

  // Create card and prepend to feed
  let card=createChaosCard(result.collision,words,selectedMood);
  let fd=document.getElementById('fd');
  fd.prepend(card);
  setTimeout(()=>card.classList.add('v'),50);

  // Scroll to top to see the card
  window.scrollTo({top:0,behavior:'smooth'});

  // Clear inputs
  document.getElementById('w1').value='';
  document.getElementById('w2').value='';
  document.getElementById('w3').value='';

  // Toast
  st2('\uD83E\uDDEA your cursed creation has entered the feed');

  btn.disabled=false;
  isColliding=false;
}

// Shake animation via keyframes (injected)
(function(){
  let s=document.createElement('style');
  s.textContent='@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}';
  document.head.appendChild(s);
})();

// ============ KEYBOARD SHORTCUTS ============
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&portalOpen)closePortal();
  // Enter in last input triggers collide
  if(e.key==='Enter'&&portalOpen&&!isColliding){
    let active=document.activeElement;
    if(active&&active.closest('.portal-words'))doCollide();
  }
});

// PWA Service Worker registration
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
// Haptic feedback on like (mobile)
document.addEventListener('click',e=>{if(e.target.closest('.lkb')&&navigator.vibrate)navigator.vibrate(10)});
lb2();lb2();
</script>
</body>
</html>
